stages:
  - quality
  - test
  - build
  - deploy

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

variables:
  npm_config_cache: $CI_PROJECT_DIR/.npm

.node:
  image: node:22
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm
  before_script:
    - npm ci

lint:
  extends: .node
  stage: quality
  script:
    - npm run lint
    - npm run check

test:unit:
  extends: .node
  stage: test
  script:
    - npm run test:unit -- --run

test:e2e:
  extends: .node
  stage: test
  script:
    - npx playwright install --with-deps chromium
    - npx playwright test

build:web:
  extends: .node
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - build
    expire_in: 1 week

# Publica en GitLab Pages la web (con base path del proyecto) y el catálogo
# de datos versionado que la app consume en "Buscar actualizaciones de
# rutas" (SPECS_V2 §4).
pages:
  extends: .node
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - BASE_PATH=/$CI_PROJECT_NAME npm run build
    - mkdir -p public
    - cp -r build/. public/
    - node scripts/publish/build-catalog.mjs public/catalog
  artifacts:
    paths:
      - public

# Los runners compartidos de gitlab.com son Linux; el binario de macOS se
# genera en local con `npm run tauri build` (ver README).
build:tauri:linux:
  extends: .node
  stage: build
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - .npm
    - key: cargo-linux
      paths:
        - .cargo
        - src-tauri/target
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev
      build-essential curl wget file libxdo-dev libssl-dev
      libayatana-appindicator3-dev librsvg2-dev
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
    - export PATH="$CARGO_HOME/bin:$PATH"
    - npm ci
  script:
    - npm run tauri build -- --bundles deb,rpm
  artifacts:
    paths:
      - src-tauri/target/release/bundle/
    expire_in: 1 week
